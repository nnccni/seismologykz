<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Кабинет оператора</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <h1>Кабинет оператора</h1>

  <div class="cabinet-actions">
    <button id="downloadLog">Скачать журнал</button>
    <button id="logout">Выход</button>
  </div>


  <form id="eventForm">
    <label>Дата:</label><input type="date" id="date" required>
    <label>Время:</label><input type="time" id="time" required>
    <label>Широта:</label><input type="number" step="any" id="lat" required>
    <label>Долгота:</label><input type="number" step="any" id="lon" required>
    <label>Магнитуда:</label><input type="number" step="any" id="magnitude" required>
    <label>Комментарий:</label><input type="text" id="comment">
    <button type="submit">Добавить событие</button>
  </form>

  <div id="map" style="height:400px; margin:20px;"></div>

  <table id="events"></table>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
