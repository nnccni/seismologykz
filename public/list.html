<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Кабинет оператора</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <header>
    <h1>Кабинет оператора</h1>
  </header>
  <main>
    <div class="top">
      <div class="form">
        <h2>Добавить событие</h2>
        <form id="addForm">
          <label>Дата: <input type="date" id="date"></label><br>
          <label>Время: <input type="time" id="time"></label><br>
          <label>Широта: <input type="text" id="lat"></label><br>
          <label>Долгота: <input type="text" id="lon"></label><br>
          <label>Магнитуда: <input type="number" step="0.1" id="magnitude"></label><br>
          <button type="submit">Сохранить</button>
        </form>
      </div>
      <div id="map"></div>
    </div>
    <div class="bottom">
      <h2>Журнал событий</h2>
      <table id="events"></table>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
