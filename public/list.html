<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Кабинет оператора</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <header>
    <h1>Кабинет оператора</h1>
  </header>
  <main>
    <!-- верхний блок: форма + карта -->
    <div class="top">
      <div class="form">
        <h2>Добавить событие</h2>
        <form id="addForm">
          <label>Дата:<br><input type="date" id="date"></label><br>
          <label>Время:<br><input type="time" id="time"></label><br>
          <label>Широта:<br><input type="text" id="lat"></label><br>
          <label>Долгота:<br><input type="text" id="lon"></label><br>
          <label>Магнитуда:<br><input type="number" step="0.1" id="magnitude"></label><br>
          <label>Комментарий:<br><input type="text" id="comment"></label><br>
          <button type="submit">Сохранить</button>
        </form>
      </div>
      <div id="map"></div>
    </div>

    <!-- нижний блок: таблица -->
    <div class="bottom">
      <h2>Журнал событий</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Дата</th>
              <th>Время</th>
              <th>Широта</th>
              <th>Долгота</th>
              <th>Магнитуда</th>
              <th>Комментарий</th>
              <th>Действие</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
